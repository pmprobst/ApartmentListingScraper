# Download snapshots and run pipeline (ingest + extract + build). Runs 1 hour after Trigger Snapshot workflow.
# Trigger runs daily at midnight UTC; this runs at 1am UTC so the snapshot has time to complete.
# Secrets required: BRIGHTDATA_API_KEY, ANTHROPIC_API_KEY, PRIVATE_DB_REPO_TOKEN
# Optional: PRIVATE_DB_REPO

name: Run Pipeline

on:
  schedule:
    - cron: "0 1 * * *"  # 1am UTC daily (1 hour after trigger)
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # for pushing commits
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone private DB repo
        env:
          TOKEN: ${{ secrets.PRIVATE_DB_REPO_TOKEN }}
          REPO: ${{ secrets.PRIVATE_DB_REPO }}
          DEFAULT_REPO: ${{ github.repository_owner }}/apartment-listings-db
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::PRIVATE_DB_REPO_TOKEN secret is not set. Add it in repo Settings > Secrets."
            exit 1
          fi
          DB_REPO="${REPO:-$DEFAULT_REPO}"
          git clone "https://x-access-token:${TOKEN}@github.com/${DB_REPO}.git" db_repo

      - name: Debug – verify cloned DB
        run: |
          echo "=== db_repo contents ==="
          ls -la db_repo/
          echo "=== listings.db size ==="
          if [ -f db_repo/listings.db ]; then
            ls -la db_repo/listings.db
          else
            echo "db_repo/listings.db NOT FOUND"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug – row count in cloned DB
        run: |
          python -c "
          import sqlite3
          db = '${{ github.workspace }}/db_repo/listings.db'
          conn = sqlite3.connect(db)
          n = conn.execute('SELECT COUNT(*) FROM listings').fetchone()[0]
          print(f'Listings in {db}: {n}')
          if n > 0:
            r = conn.execute('SELECT MIN(last_seen), MAX(last_seen) FROM listings').fetchone()
            print(f'last_seen range: {r[0]} to {r[1]}')
          conn.close()
          "

      - name: Wait for snapshot and download
        env:
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
          LISTINGS_DB: ${{ github.workspace }}/db_repo/listings.db
          BUILD_PAGE_OUTPUT: ${{ github.workspace }}/docs
          SNAPSHOT_DATA_DIR: ${{ github.workspace }}/db_repo
        run: |
          for i in $(seq 1 10); do
            echo "Attempt $i/10: checking if snapshot is ready..."
            if python scripts/scrape_download.py; then
              echo "Snapshot downloaded successfully."
              exit 0
            fi
            if [ $i -lt 10 ]; then
              echo "Snapshot not ready yet. Waiting 90 seconds..."
              sleep 90
            fi
          done
          echo "No snapshot ready after 10 attempts (≈15 min). Ingest will use any previously downloaded snapshots."
          exit 0

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LISTINGS_DB: ${{ github.workspace }}/db_repo/listings.db
          BUILD_PAGE_OUTPUT: ${{ github.workspace }}/docs
          SNAPSHOT_DATA_DIR: ${{ github.workspace }}/db_repo
        run: python main.py

      - name: Push DB and snapshot data to private repo
        run: |
          cd db_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update listings.db and snapshot data [skip ci]"
            git push
          fi

      - name: Push site to public repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No site changes to commit."
          else
            git commit -m "Update generated site [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
