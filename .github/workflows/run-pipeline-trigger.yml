# Trigger Bright Data snapshot only. Pipeline (download + ingest + build) runs via run-pipeline.yml (manual or when schedule is re-enabled).
# Scheduled runs paused — re-add `schedule` below to resume daily 9am UTC.
# Secrets required: BRIGHTDATA_API_KEY, PRIVATE_DB_REPO_TOKEN
# Optional: PRIVATE_DB_REPO

name: Trigger Snapshot

on:
  # schedule:
  #   - cron: "0 9 * * *"  # 9am UTC daily
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone private DB repo
        env:
          TOKEN: ${{ secrets.PRIVATE_DB_REPO_TOKEN }}
          REPO: ${{ secrets.PRIVATE_DB_REPO }}
          DEFAULT_REPO: ${{ github.repository_owner }}/apartment-listings-db
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::PRIVATE_DB_REPO_TOKEN secret is not set. Add it in repo Settings > Secrets."
            exit 1
          fi
          DB_REPO="${REPO:-$DEFAULT_REPO}"
          git clone "https://x-access-token:${TOKEN}@github.com/${DB_REPO}.git" db_repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Trigger Bright Data snapshot
        env:
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
          LISTINGS_DB: ${{ github.workspace }}/db_repo/listings.db
          BUILD_PAGE_OUTPUT: ${{ github.workspace }}/docs
          SNAPSHOT_DATA_DIR: ${{ github.workspace }}/db_repo
        run: python scripts/scrape.py
        continue-on-error: true

      - name: Push snapshot history to private repo
        run: |
          cd db_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Trigger snapshot [skip ci]"
            git push
          fi
